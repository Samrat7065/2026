<!DOCTYPE html>
<html>
<head>
    <title>My Simple Chat</title>
</head>
<body>
    <h2>Firebase Chat</h2>
    <div id="messages" style="height: 200px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px;"></div>
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDDDYtwu-I22lTRs0d1pP2vl15p3GfTGhw",
  authDomain: "chat-2cfab.firebaseapp.com",
  databaseURL: "https://chat-2cfab-default-rtdb.firebaseio.com",
  projectId: "chat-2cfab",
  storageBucket: "chat-2cfab.firebasestorage.app",
  messagingSenderId: "1051241280306",
  appId: "1:1051241280306:web:a5571085975c959f0e9d2b",
  measurementId: "G-927ZJR2WRS"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const messagesRef = ref(db, 'messages');

      // Message bhejne ke liye
      window.sendMessage = () => {
        const input = document.getElementById('messageInput');
        if(input.value) {
            push(messagesRef, { text: input.value });
            input.value = '';
        }
      };

      // Message receive karne ke liye
      onChildAdded(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        const div = document.getElementById('messages');
        div.innerHTML += `<p>${msg.text}</p>`;
      });
    </script>
</body>
</html>
